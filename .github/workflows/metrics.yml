name: GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Dashboard Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Aayush-Gangwar
          filename: github-metrics.svg
          template: classic
         # config_theme: github_dark
          # config_display: compact 
          
          # Base settings 
          # base: header, activity, community, repositories
          base: activity, repositories
         
          base_indepth: yes
          # base_indepth: no
          
          # base_skip: yes 
          
          # FIXED: "user" tracks your PRs across outside community organizations 
          plugin_followup: yes
          plugin_followup_indepth: yes
          plugin_followup_sections: user

          # Notable Contributions Plugin (Shows exactly WHERE you contributed)
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_types: commit, pull_request

        # Pulls data from both repositories you own and ones you collaborate on
        # repositories_affiliations: owner, collaborator, organization_member
          
          # Lines of Code Contribution
          # plugin_lines: yes
          
          # Senior Coding Habits 
         # plugin_habits: yes
          # plugin_habits_from: 50
          #  plugin_habits_days: 14
         #  plugin_habits_facts: yes
         #  plugin_habits_charts: yes
          
          # Language distribution
          # plugin_languages: yes
          # plugin_languages_details: bytes-size, percentage
          # plugin_languages_sections: most-used
          
          # Contributions tracking calendar
          # plugin_isocalendar: yes
          # plugin_isocalendar_duration: full-year
